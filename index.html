<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eid Mubarak My Queen 🌙</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins', sans-serif;}

html, body {
  overflow: hidden;
  position: fixed;
  width: 100%;
  height: 100%;
  background: #1a0005; 
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  touch-action: none;
}

/* LOCK SCREEN */
.lockScreen{
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  padding: 20px;
}

.lockScreen h2 {
  color: #ff3e6c;
  margin-bottom: 25px;
  font-size: clamp(1.1rem, 5vw, 1.5rem);
  text-align: center;
  font-weight: 500;
}

.lockScreen input{
  background: transparent;
  border: 1px solid #ff3e6c;
  padding: 12px 20px;
  border-radius: 5px;
  color: #fff;
  font-size: 1rem;
  text-align: center;
  outline: none;
  width: 100%;
  max-width: 250px;
  margin-bottom: 20px;
}

/* CURTAINS */
.curtainContainer {
  position: fixed;
  inset: 0;
  z-index: 40;
  pointer-events: none;
  overflow: hidden; 
}

.curtain{
  position: absolute;
  top: 0;
  width: 51%; 
  height: 100%;
  background: #2b0008;
  transition: transform 2.2s cubic-bezier(0.7, 0, 0.3, 1);
}

.left{ left: 0; border-right: 1px solid #ff3e6c; }
.right{ right: 0; border-left: 1px solid #ff3e6c; }

.openLeft{ transform: translateX(-100%); }
.openRight{ transform: translateX(100%); }

/* MAIN TEXT */
.container{
  position: relative;
  z-index: 5;
  width: 90%;
  max-width: 750px;
  text-align: center;
  opacity: 0;
}

.line{
  font-size: clamp(1.1rem, 5vw, 2rem);
  font-weight: 700;
  color: #ff3e6c;
  opacity: 0;
  transform: translateY(15px);
  transition: 1s all ease-in-out;
  line-height: 1.6;
}

.show{ opacity: 1; transform: translateY(0); }

canvas{ position: fixed; inset: 0; z-index: 1; pointer-events: none; }
</style>
</head>
<body>

<div class="lockScreen" id="lockScreen">
  <h2>Eid Mubarak My Queen 🌙</h2>
  <input type="text" id="passInput" placeholder="DD/MM" inputmode="text">
</div>

<div class="curtainContainer">
  <div class="curtain left" id="leftCurtain"></div>
  <div class="curtain right" id="rightCurtain"></div>
</div>

<div class="container" id="textContainer">
  <div class="line" id="textLine"></div>
</div>

<canvas id="canvas"></canvas>

<script>
let started = false;

const lines = [
  "Eid Mubarak to the incredible woman who is the center of my universe",
  "Every single day I thank Allah for the blessing of having you as my life partner",
  "You are not just my wife you are my strength my peace and my home",
  "As we celebrate this Eid my deepest prayer is for our bond to be protected",
  "May we remain united in this life and the hereafter",
  "May Allah fill your life with the kind of pure happiness you bring into mine",
  "May He grant you impeccable health and fulfill every silent prayer of your heart",
  "Thank you for being my constant support and the most beautiful part of my existence",
  "You truly mean everything to me and I love you beyond any measure",
  "Stay Blessed and Always Happy ❤️",
  "I Love You Forever"
];

let i = 0;
const input = document.getElementById("passInput");
const textLine = document.getElementById("textLine");
const textContainer = document.getElementById("textContainer");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Password check logic
input.addEventListener("input", () => {
  if(input.value === "24/10" && !started){
    started = true;
    unlock();
  }
});

function unlock(){
  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("leftCurtain").classList.add("openLeft");
  document.getElementById("rightCurtain").classList.add("openRight");
  
  setTimeout(() => {
      textContainer.style.opacity = "1";
      showLines();
      animateHearts();
  }, 500);
}

function showLines(){
  if(i >= lines.length) return; 
  textLine.classList.remove("show");
  setTimeout(() => {
    textLine.innerHTML = lines[i];
    textLine.classList.add("show");
    i++;
    setTimeout(showLines, 6500); 
  }, 600);
}

let hearts = [];
function animateHearts(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if(Math.random() < 0.08) createHeart();
  hearts.forEach((h, index) => {
    h.y -= h.speed; h.alpha -= 0.005;
    ctx.globalAlpha = h.alpha; ctx.fillStyle = "#ff3e6c";
    ctx.font = h.size + "px serif"; ctx.fillText("❤️", h.x, h.y);
    if(h.alpha <= 0) hearts.splice(index, 1);
  });
  requestAnimationFrame(animateHearts);
}

function createHeart(){
  hearts.push({
    x: Math.random() * canvas.width,
    y: canvas.height + 10,
    speed: Math.random() * 1.5 + 0.5,
    size: Math.random() * 15 + 10,
    alpha: 1
  });
}
</script>
</body>
</html>
